<div class="f4-layout-container">

    <div class="f4-accordion-group">
        <div class="f4-accordion-header" onclick="toggleF4Accordion(this)">
            <span>File</span>
            <span class="f4-toggle-icon">▲</span>
        </div>
        <div class="f4-accordion-content">
            <button id="f1-key-save" class="f4-card-btn">
                <span class="main-txt">💾 Save</span>
                <span class="sub-txt">Overwrite current</span>
            </button>
            <button id="f4-key-save-as-new" class="f4-card-btn">
                <span class="main-txt">📄 Save as</span>
                <span class="sub-txt">Create new version</span>
            </button>
            <button id="f1-key-export" class="f4-card-btn" style="border-color: #ddd;">
                <span class="main-txt text-dark">⬇️ Export</span>
                <span class="sub-txt">Download CSV</span>
            </button>
        </div>
    </div>

    <div class="f4-accordion-group">
        <div class="f4-accordion-header" onclick="toggleF4Accordion(this)">
            <span>Search</span>
            <span class="f4-toggle-icon">▲</span>
        </div>
        <div class="f4-accordion-content">
            <button id="f1-key-load" class="f4-card-btn">
                <span class="main-txt text-dark">📂 Load File</span>
                <span class="sub-txt">Open local quote</span>
            </button>
            <button id="f4-key-search-dialog" class="f4-card-btn">
                <span class="main-txt text-dark">🔍 Search</span>
                <span class="sub-txt">Find by ID / Name</span>
            </button>
        </div>
    </div>

    <div class="f4-separator"></div>

    <div class="f4-accordion-group">
        <div class="f4-accordion-header" onclick="toggleF4Accordion(this)">
            <span>Order</span>
            <span class="f4-toggle-icon">▲</span>
        </div>
        <div class="f4-accordion-content">
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="f4-key-generate-work-order" class="btn btn-outline"
                    style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; cursor: pointer; background: #fff;">Gen-Order</button>
                <button id="f4-key-generate-xls" class="btn btn-light-green"
                    style="padding: 10px; border: 1px solid #c8e6c9; border-radius: 4px; font-weight: bold; cursor: pointer; background: #e8f5e9; color: #2e7d32;">Gen-Xls</button>
            </div>
            <button id="f4-btn-cancel-correct" class="btn btn-red-solid"
                style="width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #c62828; color: #fff; margin-top: 8px;">Cancel
                / Correct</button>

            <div id="f4-correction-controls" class="f4-correction-controls is-hidden"
                style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;">
                <button id="f4-btn-correction-set" class="btn btn-blue"
                    style="padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #007bff; color: #fff;">SET</button>
                <button id="f4-btn-correction-exit" class="btn btn-gray"
                    style="padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #6c757d; color: #fff;">Exit</button>
            </div>

            <div class="grid-status"
                style="display: grid; grid-template-columns: 3fr 1fr; gap: 8px; margin-top: 8px;">
                <select id="f4-status-dropdown" class="status-select"
                    style="padding: 8px; border: 1px solid #ced4da; border-radius: 4px; background: #fff;">
                    <option value="A. Saved">A. Saved</option>
                    <option value="B. Quoted">B. Quoted</option>
                    <option value="C. Ordered">C. Ordered</option>
                </select>
                <button id="f4-status-update-btn" class="btn btn-outline"
                    style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer;">⏎</button>
            </div>

            <button id="f4-btn-open-payment-modal" class="btn btn-outline"
                style="width: 100%; padding: 10px; margin-top: 15px; border: 1px solid #4caf50; border-radius: 4px; font-weight: bold; cursor: pointer; background: #e8f5e9; color: #2e7d32;">💳 Add Payment</button>

            <!-- Payment Modal Overlay -->
            <div id="f4-payment-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
                <div style="background: white; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h3 style="margin-top: 0; color: #333;">Register Payment</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <input type="number" id="f4-payment-amount" placeholder="Amount ($)" class="input-field" style="width: 100%; border-radius: 4px; padding: 8px; box-sizing: border-box;" />
                        <input type="date" id="f4-payment-date" class="input-field" style="width: 100%; border-radius: 4px; padding: 8px; box-sizing: border-box;" />
                    </div>
                    <select id="f4-payment-method" class="status-select" style="width: 100%; margin-top: 8px; padding: 8px; border-radius: 4px; box-sizing: border-box;">
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Cash">Cash</option>
                    </select>
                    <div style="display: flex; justify-content: space-between; gap: 10px; margin-top: 15px;">
                        <button id="f4-btn-cancel-payment" class="btn btn-outline"
                            style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; cursor: pointer; background: #fff;">Cancel</button>
                        <button id="f4-btn-register-payment" class="btn btn-green-solid"
                            style="flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #4caf50; color: #fff;">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="f4-accordion-group collapsed">
        <div class="f4-accordion-header" onclick="toggleF4Accordion(this)">
            <span>Login</span>
            <span class="f4-toggle-icon">▲</span>
        </div>
        <div class="f4-accordion-content">
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="f4-key-logout" class="btn btn-light-red"
                    style="padding: 10px; border: 1px solid #ffcdd2; border-radius: 4px; font-weight: bold; cursor: pointer; background: #ffebee; color: #c62828;">Logout</button>
                <button id="f4-key-relogin" class="btn btn-light-red"
                    style="padding: 10px; border: 1px solid #ffcdd2; border-radius: 4px; font-weight: bold; cursor: pointer; background: #ffebee; color: #c62828;">Re-Login</button>
            </div>
            <button id="f1-key-reset" class="btn btn-red-solid"
                style="width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #c62828; color: #fff; margin-top: 8px;">Reset</button>
        </div>
    </div>

    <div class="f4-accordion-group">
        <div class="f4-accordion-header" onclick="toggleF4Accordion(this)">
            <span>Admin</span>
            <span class="f4-toggle-icon">▲</span>
        </div>
        <div class="f4-accordion-content" style="align-items: center;">
            <button id="f4-btn-admin-entry" class="btn btn-outline"
                style="width: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; cursor: pointer; background: #fff; margin: 0 auto; display: block;">Admin</button>
        </div>
    </div>

</div>
